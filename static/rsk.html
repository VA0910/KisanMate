<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b3d2e">
<title>RSK Officer Dashboard – KisanMate</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%A1%EF%B8%8F%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/css/rsk.css">
</head>
<body>
<a class="skip-link" href="#main">Skip to main content</a>

<svg xmlns="http://www.w3.org/2000/svg" class="icon-sprite" aria-hidden="true" focusable="false">
  <symbol id="i-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 3 21 9 15 9"/>
  </symbol>
  <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </symbol>
  <symbol id="i-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>
  </symbol>
  <symbol id="i-leaf" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/>
  </symbol>
  <symbol id="i-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
  </symbol>
  <symbol id="i-bell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
  </symbol>
  <symbol id="i-users" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
  </symbol>
  <symbol id="i-spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <circle cx="12" cy="12" r="10" opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10"/>
  </symbol>
</svg>

<header class="topbar">
  <div class="topbar-brand">
    <span class="topbar-emoji" aria-hidden="true">🛡️</span>
    <div>
      <h1 class="topbar-title">RSK Officer Dashboard</h1>
      <p class="topbar-sub">KisanMate · human-in-the-loop confirmation gate</p>
    </div>
  </div>
  <button type="button" id="refresh-btn" class="btn btn-ghost">
    <svg class="icon" aria-hidden="true"><use href="#i-refresh"></use></svg>
    <span>Refresh</span>
  </button>
</header>

<main id="main" class="layout">
  <!-- Cases queue -->
  <section class="panel" aria-labelledby="cases-heading">
    <div class="panel-head">
      <h2 id="cases-heading"><svg class="icon" aria-hidden="true"><use href="#i-leaf"></use></svg> Cases awaiting review</h2>
      <span id="cases-count" class="pill-count" aria-live="polite"></span>
    </div>

    <div id="cases-loading" class="state-block">
      <svg class="icon icon-lg spin" aria-hidden="true"><use href="#i-spinner"></use></svg>
      <p>Loading cases…</p>
    </div>
    <div id="cases-empty" class="state-block" hidden>
      <svg class="icon icon-lg" aria-hidden="true"><use href="#i-check"></use></svg>
      <p>No cases waiting. Every diagnosis has a verdict.</p>
    </div>
    <div id="cases-error" class="state-block state-error" hidden>
      <p id="cases-error-msg"></p>
      <button type="button" class="btn btn-secondary" data-retry="cases">Try again</button>
    </div>
    <ul id="cases-list" class="cards" hidden></ul>
  </section>

  <!-- Fired alerts -->
  <section class="panel" aria-labelledby="alerts-heading">
    <div class="panel-head">
      <h2 id="alerts-heading"><svg class="icon" aria-hidden="true"><use href="#i-bell"></use></svg> Alerts fired</h2>
      <span id="alerts-count" class="pill-count" aria-live="polite"></span>
    </div>

    <div id="alerts-loading" class="state-block">
      <svg class="icon icon-lg spin" aria-hidden="true"><use href="#i-spinner"></use></svg>
      <p>Loading alerts…</p>
    </div>
    <div id="alerts-empty" class="state-block" hidden>
      <svg class="icon icon-lg" aria-hidden="true"><use href="#i-bell"></use></svg>
      <p>No alerts have fired yet.</p>
    </div>
    <div id="alerts-error" class="state-block state-error" hidden>
      <p id="alerts-error-msg"></p>
      <button type="button" class="btn btn-secondary" data-retry="alerts">Try again</button>
    </div>
    <ul id="alerts-list" class="cards" hidden></ul>
  </section>
</main>

<div id="toast" role="status" aria-live="assertive" class="toast" hidden></div>

<!-- Template for one case card, cloned per case -->
<template id="case-card-template">
  <li class="card case-card">
    <div class="card-head">
      <span class="status-chip" data-el="status"></span>
      <span class="case-farmer">
        <strong data-el="farmerName"></strong>
        <span class="case-meta" data-el="cropMeta"></span>
      </span>
    </div>

    <dl class="case-facts">
      <div class="case-fact">
        <dt><svg class="icon icon-sm" aria-hidden="true"><use href="#i-pin"></use></svg> Location</dt>
        <dd data-el="location"></dd>
      </div>
      <div class="case-fact" data-el="noteRow">
        <dt>Photo note</dt>
        <dd data-el="note"></dd>
      </div>
    </dl>

    <div class="ai-block">
      <div class="ai-head">
        <span class="ai-label">AI diagnosis</span>
        <span class="ai-condition" data-el="aiCondition"></span>
      </div>
      <div class="conf-row">
        <div class="conf-bar" role="img" data-el="confBar">
          <span class="conf-fill" data-el="confFill"></span>
        </div>
        <span class="conf-num" data-el="confNum"></span>
      </div>
      <p class="ai-decision" data-el="decision"></p>
      <div class="symptoms" data-el="symptomsWrap">
        <span class="symptoms-label">Visible symptoms:</span>
        <span class="chips" data-el="symptoms"></span>
      </div>
    </div>

    <form class="verdict" data-el="verdictForm">
      <fieldset class="verdict-fields">
        <legend class="visually-hidden">Officer verdict</legend>
        <div class="verdict-actions">
          <button type="button" class="btn btn-primary" data-el="confirmBtn">
            <svg class="icon" aria-hidden="true"><use href="#i-check"></use></svg>
            <span data-el="confirmLabel">Confirm diagnosis</span>
          </button>
          <button type="button" class="btn btn-secondary" data-el="overrideToggle" aria-expanded="false">
            <svg class="icon" aria-hidden="true"><use href="#i-edit"></use></svg>
            <span>Override</span>
          </button>
        </div>
        <div class="override-panel" data-el="overridePanel" hidden>
          <label class="override-label" data-el="overrideLabel">Correct condition
            <select class="override-select" data-el="overrideSelect"></select>
          </label>
          <button type="submit" class="btn btn-primary" data-el="overrideSubmit">Submit override</button>
        </div>
      </fieldset>
    </form>
  </li>
</template>

<!-- Template for one fired-alert card -->
<template id="alert-card-template">
  <li class="card alert-card">
    <div class="card-head">
      <span class="tier-chip" data-el="tier"></span>
      <span class="alert-condition" data-el="condition"></span>
    </div>
    <p class="alert-recipients">
      <svg class="icon icon-sm" aria-hidden="true"><use href="#i-users"></use></svg>
      <span data-el="recipients"></span>
    </p>
    <p class="alert-meta" data-el="meta"></p>
  </li>
</template>

<script src="/static/js/rsk.js"></script>
</body>
</html>
